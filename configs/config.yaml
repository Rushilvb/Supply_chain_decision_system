data:
  raw_sales: data/raw/train.csv
  raw_store: data/raw/store.csv
  processed: data/processed/features.parquet

features:
  lags: [7, 14, 21, 28]
  rolling_windows: [7, 14, 28]
  target: Sales

model:
  name: lightgbm
  params:
    n_estimators: 1000
    learning_rate: 0.05
    num_leaves: 31
    early_stopping_rounds: 50

walk_forward:
  n_splits: 5
  gap_days: 7
  forecast_horizon: 42

decision:
  lead_time_days: 7
  safety_stock_multiplier: 1.5
  stockout_risk_threshold: 0.3
  overstock_threshold: 2.0

api:
  host: 0.0.0.0
  port: 8000

mlflow:
  experiment_name: supply_chain_forecasting
  tracking_uri: mlruns/
